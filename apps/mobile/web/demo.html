<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shakana Founder Recording</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --orange: #C96442;
    --cream: #F8F2EA;
    --paper: #FFFCF7;
    --line: #E6DCCE;
    --ink: #211D19;
    --muted: #70675F;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
    background: var(--cream);
    color: var(--ink);
    font-family: Rubik, Arial, sans-serif;
  }
  main {
    width: min(720px, 100%);
    border: 1px solid var(--line);
    border-radius: 28px;
    background: var(--paper);
    padding: 34px;
    box-shadow: 0 28px 80px rgba(33, 29, 25, 0.1);
    display: grid;
    gap: 18px;
  }
  .brand {
    color: var(--orange);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  h1 {
    margin: 0;
    font-size: clamp(32px, 7vw, 58px);
    line-height: 1;
  }
  p {
    margin: 0;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.7;
  }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  a {
    display: inline-flex;
    min-height: 44px;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    padding: 10px 16px;
    text-decoration: none;
    font-weight: 800;
  }
  .primary { background: var(--orange); color: white; }
  .secondary { border: 1px solid var(--line); color: var(--ink); background: white; }
</style>
</head>
<body>
  <main>
    <div class="brand">shakana</div>
    <h1>Founder recording coming next.</h1>
    <p>
      The old recording was removed because it was not the final Shakana app video.
      When the founder narration is ready, this page can hold the finished video with the correct Shakana background and product story.
    </p>
    <div class="actions">
      <a class="primary" href="/shakana-story.html">Open current story video</a>
      <a class="secondary" href="/user">Back to app</a>
    </div>
  </main>
</body>
</html>
